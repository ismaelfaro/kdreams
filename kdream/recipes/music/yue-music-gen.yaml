apiVersion: kdream/v1
kind: Recipe
metadata:
  name: yue-music-gen
  version: 1.0.0
  description: YuE by M-A-P — full-song generation model producing structured music with vocals, instruments, and lyrics from genre/lyrics prompts
  tags: [music-generation, full-song, vocals, lyrics, yue, map]
  license: Apache-2.0
  author: kdream-community

source:
  repo: https://github.com/multimodal-art-projection/YuE
  ref: main
  install_extras: []

models:
  - name: yue-s1-7b
    source: huggingface
    id: m-a-p/YuE-s1-7B-anneal-en-cot
    destination: models/yue-s1-7b
  - name: yue-s2-7b
    source: huggingface
    id: m-a-p/YuE-s2-7B-general
    destination: models/yue-s2-7b

entrypoint:
  script: inference/infer.py
  type: python

inputs:
  genre_prompt:
    type: string
    required: true
    description: Genre and style description (e.g. "inspiring female uplifting pop, R&B, gentle piano, warm vocals")
  lyrics_prompt:
    type: string
    required: true
    description: Lyrics or lyric structure for the generated song (verse/chorus sections)
  num_segments:
    type: integer
    default: 2
    min: 1
    max: 10
    description: Number of song segments to generate
  max_new_tokens:
    type: integer
    default: 3000
    min: 100
    max: 8000
    description: Max tokens per segment during Stage 1 generation
  seed:
    type: integer
    default: -1
    description: Random seed (-1 for random)
  use_audio_prompt:
    type: boolean
    default: false
    description: Whether to use an audio reference prompt for style conditioning

outputs:
  - name: audio
    type: file
    path: outputs/{timestamp}.wav

backends:
  local:
    requires_gpu: true
    min_vram_gb: 16
    tested_on: [cuda]
