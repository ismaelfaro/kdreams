apiVersion: kdream/v1
kind: Recipe
metadata:
  name: flux-1-schnell
  version: 1.0.0
  description: FLUX.1 [schnell] — the fastest distilled text-to-image model by Black Forest Labs, optimised for 1–4 step inference
  tags: [image-generation, diffusion, text-to-image, flux, fast]
  license: Apache-2.0
  author: kdream-community

source:
  repo: https://github.com/black-forest-labs/flux
  ref: main
  install_extras: []

models:
  - name: flux-1-schnell
    source: huggingface
    id: black-forest-labs/FLUX.1-schnell
    destination: models/flux-1-schnell

entrypoint:
  script: src/flux/cli.py
  type: python

inputs:
  prompt:
    type: string
    required: true
    description: Text description of the image to generate
  width:
    type: integer
    default: 1360
    min: 256
    max: 2048
    description: Output image width in pixels
  height:
    type: integer
    default: 768
    min: 256
    max: 2048
    description: Output image height in pixels
  steps:
    type: integer
    default: 4
    min: 1
    max: 8
    description: Number of denoising steps (4 is optimal for schnell)
  seed:
    type: integer
    default: -1
    description: Random seed (-1 for random)

outputs:
  - name: image
    type: file
    path: outputs/{timestamp}.png

backends:
  local:
    requires_gpu: true
    min_vram_gb: 12
    tested_on: [cuda]
