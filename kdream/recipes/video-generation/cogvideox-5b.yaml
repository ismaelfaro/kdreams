apiVersion: kdream/v1
kind: Recipe
metadata:
  name: cogvideox-5b
  version: 1.0.0
  description: CogVideoX-5B by Zhipu AI — state-of-the-art open-source text-to-video generation with temporal consistency
  tags: [video-generation, text-to-video, diffusion, cogvideo, zhipuai]
  license: CogVideoX LICENSE
  author: kdream-community

source:
  repo: https://github.com/THUDM/CogVideo
  ref: main
  install_extras: []

models:
  - name: cogvideox-5b
    source: huggingface
    id: THUDM/CogVideoX-5b
    destination: models/cogvideox-5b

entrypoint:
  script: inference/cli_demo/cli_demo.py
  type: python

inputs:
  prompt:
    type: string
    required: true
    description: Text description of the video to generate
  num_frames:
    type: integer
    default: 49
    min: 1
    max: 100
    description: Number of video frames to generate
  fps:
    type: integer
    default: 8
    min: 1
    max: 30
    description: Output video frames per second
  width:
    type: integer
    default: 720
    min: 256
    max: 1280
    description: Video width in pixels
  height:
    type: integer
    default: 480
    min: 256
    max: 720
    description: Video height in pixels
  steps:
    type: integer
    default: 50
    min: 1
    max: 100
    description: Number of denoising steps
  guidance_scale:
    type: float
    default: 6.0
    min: 1.0
    max: 20.0
    description: Guidance scale
  seed:
    type: integer
    default: -1
    description: Random seed (-1 for random)

outputs:
  - name: video
    type: file
    path: outputs/{timestamp}.mp4

backends:
  local:
    requires_gpu: true
    min_vram_gb: 24
    tested_on: [cuda]
