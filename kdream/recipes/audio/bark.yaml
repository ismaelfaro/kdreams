apiVersion: kdream/v1
kind: Recipe
metadata:
  name: bark
  version: 1.0.0
  description: Bark by Suno AI — transformer-based text-to-audio model capable of speech, music, and sound effects with voice cloning
  tags: [audio, text-to-speech, tts, voice, sound-effects, suno, bark]
  license: MIT
  author: kdream-community

source:
  repo: https://github.com/suno-ai/bark
  ref: main
  install_extras: []

models:
  - name: bark
    source: huggingface
    id: suno/bark
    destination: models/bark

entrypoint:
  script: notebooks/bark_experiments.ipynb
  type: python

inputs:
  text_prompt:
    type: string
    required: true
    description: Text to synthesise — supports [laughter], [sighs], [music] tags and speaker history prompts
  voice_preset:
    type: string
    default: "v2/en_speaker_6"
    description: Voice preset (e.g. v2/en_speaker_0 through v2/en_speaker_9, or multilingual variants)
  text_temp:
    type: float
    default: 0.7
    min: 0.1
    max: 1.0
    description: Temperature for semantic token generation
  waveform_temp:
    type: float
    default: 0.7
    min: 0.1
    max: 1.0
    description: Temperature for waveform generation

outputs:
  - name: audio
    type: file
    path: outputs/{timestamp}.wav

backends:
  local:
    requires_gpu: true
    min_vram_gb: 6
    tested_on: [cuda, mps]
