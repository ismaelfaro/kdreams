apiVersion: kdream/v1
kind: Recipe
metadata:
  name: mistral-7b-v03
  version: 1.0.0
  description: Mistral AI's 7B parameter instruction-following model — fast, capable, Apache 2.0
  tags: [text-generation, llm, mistral, instruction-tuned]
  license: Apache-2.0
  author: kdream-community

source:
  repo: https://github.com/mistralai/mistral-inference
  ref: main
  install_extras: []

models:
  - name: mistral-7b-v0.3
    source: huggingface
    id: mistralai/Mistral-7B-Instruct-v0.3
    destination: models/mistral-7b

entrypoint:
  script: mistral_inference/main.py
  type: python

inputs:
  prompt:
    type: string
    required: true
    description: Instruction or question for the model
  max_tokens:
    type: integer
    default: 512
    min: 1
    max: 32768
    description: Maximum tokens to generate
  temperature:
    type: float
    default: 0.7
    min: 0.0
    max: 2.0
    description: Sampling temperature
  top_p:
    type: float
    default: 0.95
    min: 0.0
    max: 1.0
    description: Top-p sampling

outputs:
  - name: text
    type: string

backends:
  local:
    requires_gpu: true
    min_vram_gb: 14
    tested_on: [cuda, mps]
