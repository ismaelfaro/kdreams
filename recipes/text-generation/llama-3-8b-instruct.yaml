apiVersion: kdream/v1
kind: Recipe
metadata:
  name: llama-3-8b-instruct
  version: 1.0.0
  description: Meta's Llama 3.1 8B instruction-tuned model for chat and text generation
  tags: [text-generation, llm, instruction-tuned, meta, llama]
  license: Llama-3-Community-License
  author: kdream-community

source:
  repo: https://github.com/meta-llama/llama-models
  ref: main
  install_extras: []

models:
  - name: llama-3.1-8b-instruct
    source: huggingface
    id: meta-llama/Meta-Llama-3.1-8B-Instruct
    destination: models/llama-3-8b-instruct

entrypoint:
  script: scripts/inference.py
  type: python

inputs:
  prompt:
    type: string
    required: true
    description: User message or instruction for the model
  system_prompt:
    type: string
    default: "You are a helpful AI assistant."
    description: System prompt to set model behaviour
  max_tokens:
    type: integer
    default: 512
    min: 1
    max: 8192
    description: Maximum number of tokens to generate
  temperature:
    type: float
    default: 0.7
    min: 0.0
    max: 2.0
    description: Sampling temperature (0 = deterministic, higher = more creative)
  top_p:
    type: float
    default: 0.9
    min: 0.0
    max: 1.0
    description: Nucleus sampling probability threshold

outputs:
  - name: text
    type: string

backends:
  local:
    requires_gpu: true
    min_vram_gb: 16
    tested_on: [cuda, mps]
